<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EFE6"/>
      <stop offset="100%" stop-color="#FAFAF7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo-Marke links -->
  <g transform="translate(80, 220)">
    <polygon points="0,0 200,0 160,80 0,80" fill="#F39239"/>
    <polygon points="0,110 200,110 160,190 0,190" fill="#F39239"/>
    <polygon points="220,110 380,110 340,190 220,190" fill="#2D2D2D"/>
  </g>

  <!-- Wortmarke rechts -->
  <text x="500" y="280" font-family="Manrope, Inter, system-ui, sans-serif" font-size="72" font-weight="800" fill="#2D2D2D" letter-spacing="-2">KFZ SERVICE</text>
  <text x="500" y="370" font-family="Manrope, Inter, system-ui, sans-serif" font-size="72" font-weight="800" fill="#F39239" letter-spacing="-2">BEYER</text>

  <!-- Subline -->
  <text x="500" y="430" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="500" fill="#4A4A4A">Werkstatt im Herzen Münchens</text>

  <!-- Trust-Bar unten -->
  <g transform="translate(80, 520)">
    <text x="0" y="30" font-family="Inter, system-ui, sans-serif" font-size="26" fill="#F39239" font-weight="700">★★★★★</text>
    <text x="180" y="30" font-family="Inter, system-ui, sans-serif" font-size="26" fill="#2D2D2D" font-weight="600">4,8 · 76 Google-Bewertungen</text>
    <text x="700" y="30" font-family="Inter, system-ui, sans-serif" font-size="26" fill="#4A4A4A">Waisenhausstraße 44 · 80637 München</text>
  </g>
</svg>
